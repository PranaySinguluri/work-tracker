<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Class & Work Calendar</title>

  <link rel="stylesheet" href="styles.css">

  <!-- Libraries -->
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>

<body>

<header>
  <h1>📅 Class & Work Calendar</h1>
</header>

<main>
  <!-- Dashboard -->
  <section class="dashboard">
    <div class="card" onclick="connectGoogle()">🔗 Connect Google</div>
    <div class="card" onclick="syncSelectedEvents()">☁️ Sync Events</div>
    <div class="card" onclick="openImport()">📂 Import Class Schedule</div>
    <div class="card" onclick="openShift()">💼 Add Work Shift</div>
    <div class="card" onclick="openCalendar()">🗓 Calendar Preview</div>
    <div class="card" onclick="openNotes()">📝 Notes</div>
    <div class="card" onclick="connectGoogle()">🔗 Google Calendar</div>
  </section>

  <!-- Import -->
  <section id="importSection" class="hidden">
    <input type="file" id="fileInput"/>
    <button onclick="handleUpload()">Extract Text</button>

    <textarea id="ocrText"></textarea>
    <button onclick="parseEvents()">Detect Events</button>

    <div id="draftEvents"></div>
    <button onclick="saveDraftEvents()">Save Events</button>
  </section>

  <!-- Work Shift -->
  <section id="shiftSection" class="hidden">
    <h2>Add Work Shift</h2>
    <input id="shiftTitle" value="Costco Shift"/>
    <input id="shiftDate" type="date"/>
    <input id="shiftStart" type="time"/>
    <input id="shiftEnd" type="time"/>
    <button onclick="saveShift()">Save Shift</button>
  </section>

  <!-- Calendar -->
  <section id="calendarSection" class="hidden">
    <div id="calendar"></div>
  </section>

  <!-- Notes -->
  <section id="notesSection" class="hidden">
    <textarea id="notes"></textarea>
  </section>

</main>

<script src="storage.js"></script>
<script src="ocr.js"></script>
<script src="calendar.js"></script>
<script src="google-calendar.js"></script>
<script src="https://apis.google.com/js/api.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="app.js"></script>

</body>
</html>
